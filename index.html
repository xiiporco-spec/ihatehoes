<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>ihatehoes</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }
    /* riempie tutta la viewport, anche dietro le notch / barre del browser mobile */
    #screen {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 120ms ease, color 120ms ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 12vw, 9rem);
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>
  <div id="screen">fuck you</div>
  <script>
    // tocco / clic: alterna nero "fuck you" <-> bianco "all 🤡"
    var dark = true;
    var screen = document.getElementById('screen');
    function toggle() {
      dark = !dark;
      var bg = dark ? '#000' : '#fff';
      var fg = dark ? '#fff' : '#000';
      screen.style.background = bg;
      screen.style.color = fg;
      screen.textContent = dark ? 'fuck you' : 'all 🤡';
      document.documentElement.style.background = bg;
      document.body.style.background = bg;
    }
    screen.addEventListener('click', toggle);
    // su mobile evita il ritardo e i doppi eventi
    screen.addEventListener('touchstart', function (e) { e.preventDefault(); toggle(); }, { passive: false });
  </script>
</body>
</html>
