<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>ihatehoes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      background: #000; overflow: hidden; cursor: none;
    }
    #screen {
      position: fixed; inset: 0;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      transition: background 200ms ease;
      --grad: linear-gradient(110deg,#cfcfcf 0%,#ffffff 18%,#ff9ce0 38%,#ffffff 52%,#bdbdbd 72%,#ffffff 100%);
      --glow: rgba(255,255,255,.45);
      --spark: #ffffff;
    }
    .word {
      position: relative;
      display: inline-flex; align-items: center; gap: .12em;
      font-family: 'Pacifico', cursive;
      font-weight: 400;
      font-size: clamp(3.2rem, 17vw, 12rem);
      line-height: 1.6;
      text-align: center;
      user-select: none; -webkit-user-select: none;
      animation: popIn 750ms cubic-bezier(.2,.85,.3,1.5) both;
    }
    /* solo il testo riceve il glitter, non l'emoji */
    .glitter {
      padding: 0.12em 0.08em 0.22em;
      background: var(--grad);
      background-size: 260% 100%;
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 10px var(--glow));
      animation: shimmer 3s linear infinite;
    }
    .emoji { line-height: 1; }
    @keyframes shimmer { to { background-position: 260% 0; } }
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(.4) rotate(-6deg); }
      60%  { opacity: 1; transform: scale(1.12) rotate(2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }
    .spark {
      position: absolute; pointer-events: none;
      color: var(--spark); font-size: .9rem; opacity: 0;
      animation: twinkle 1.6s ease-in-out infinite;
      text-shadow: 0 0 6px var(--spark);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(.4); }
      50%      { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div id="screen">
    <span id="word" class="word">
      <span id="wtext" class="glitter">fuck you</span><span id="wemoji" class="emoji"></span>
    </span>
    <span class="spark" style="top:18%;left:20%;animation-delay:0s">✦</span>
    <span class="spark" style="top:30%;left:78%;animation-delay:.3s;font-size:1.3rem">✦</span>
    <span class="spark" style="top:68%;left:30%;animation-delay:.6s;font-size:1.1rem">✦</span>
    <span class="spark" style="top:74%;left:70%;animation-delay:.9s">✦</span>
    <span class="spark" style="top:22%;left:55%;animation-delay:1.2s;font-size:.7rem">✦</span>
    <span class="spark" style="top:60%;left:50%;animation-delay:.45s;font-size:.8rem">✦</span>
  </div>
  <script>
    var dark = true;
    var screen = document.getElementById('screen');
    var word = document.getElementById('word');
    var wtext = document.getElementById('wtext');
    var wemoji = document.getElementById('wemoji');

    var THEME = {
      dark: {
        bg: '#000', text: 'fuck you', emoji: '',
        grad: 'linear-gradient(110deg,#cfcfcf 0%,#ffffff 18%,#ff9ce0 38%,#ffffff 52%,#bdbdbd 72%,#ffffff 100%)',
        glow: 'rgba(255,255,255,.45)', spark: '#ffffff'
      },
      light: {
        bg: '#fff', text: 'all', emoji: '🤡',
        grad: 'linear-gradient(110deg,#b8860b 0%,#ffd700 22%,#c2185b 45%,#ffd700 68%,#b8860b 100%)',
        glow: 'rgba(194,24,91,.35)', spark: '#c2185b'
      }
    };

    function apply(t) {
      screen.style.background = t.bg;
      document.documentElement.style.background = t.bg;
      document.body.style.background = t.bg;
      screen.style.setProperty('--grad', t.grad);
      screen.style.setProperty('--glow', t.glow);
      screen.style.setProperty('--spark', t.spark);
      wtext.textContent = t.text;
      wemoji.textContent = t.emoji;
      word.style.animation = 'none';
      void word.offsetWidth;
      word.style.animation = '';
    }

    function toggle() {
      dark = !dark;
      apply(dark ? THEME.dark : THEME.light);
    }

    apply(THEME.dark);
    screen.addEventListener('click', toggle);
    screen.addEventListener('touchstart', function (e) { e.preventDefault(); toggle(); }, { passive: false });
  </script>
</body>
</html>
